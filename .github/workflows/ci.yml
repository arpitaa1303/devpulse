name: DevPulse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-backend:
    name: Test Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          cd backend
          pytest -v --tb=short

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          docker build ./backend -t devpulse-backend:test

      - name: Build frontend image
        run: |
          docker build ./frontend -t devpulse-frontend:test

      - name: Smoke test backend container
        run: |
          docker rm -f backend-test >/dev/null 2>&1 || true
          docker run -d -p 8000:8000 \
            -e GITHUB_TOKEN=${{ secrets.GH_PAT }} \
            --name backend-test devpulse-backend:test
          for attempt in {1..10}; do
            if curl --fail --silent http://localhost:8000/health; then
              docker rm -f backend-test
              exit 0
            fi
            sleep 2
          done
          docker logs backend-test
          docker rm -f backend-test
          exit 1
